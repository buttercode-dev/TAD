name: Apply TAD Phase 1 blockers

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/phase-1-production-blockers
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: mkdir -p supabase/migrations
      - name: Apply patch with assertion capture
        id: patch
        continue-on-error: true
        run: |
          node scripts/apply-phase1.mjs >/tmp/phase1.log 2>&1
          cat /tmp/phase1.log
      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tad-phase1-log
          retention-days: 1
          path: /tmp/phase1.log
      - name: Stop on patch failure
        if: steps.patch.outcome == 'failure'
        run: exit 1
      - run: node tests/run-tests.mjs
      - name: Upload verified Phase 1 files
        uses: actions/upload-artifact@v4
        with:
          name: tad-phase1-verified
          retention-days: 1
          path: |
            app/assets/engine.js
            app/assets/app.js
            tests/run-tests.mjs
            index.html
            admin-systems.html
            docs/PRODUCTION-WIRING.md
            supabase/migrations/0001_restrict_rls_auto_enable.sql
