name: Verify TAD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Admin HQ and evidence regression
        run: node tests/run-tests.mjs
      - name: Operational truth contract
        run: node tests/operational-truth-contract.mjs
      - name: Admin Audit browser journey
        shell: bash
        run: |
          mkdir -p test-results
          set -o pipefail
          node tests/browser-audit.mjs 2>&1 | tee test-results/browser-audit.log
      - name: Upload browser proof and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-audit-v2-browser-proof
          path: |
            test-results/browser-audit.log
            test-results/admin-audit-v2-mobile.png
          if-no-files-found: warn
